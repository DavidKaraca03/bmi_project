<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 480px;
            margin: 60px auto;
            background: #f4f6f8;
            color: #333;
        }
        h1 {
            text-align: center;
            margin-bottom: 24px;
        }
        form {
            background: #fff;
            padding: 28px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
        }
        input[type="number"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 18px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 1rem;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #007bff;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            cursor: pointer;
        }
        button:hover {
            background: #0056b3;
        }
        .resultaat {
            margin-top: 24px;
            background: #fff;
            padding: 20px 28px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            text-align: center;
        }
        .bmi-waarde {
            font-size: 2.5rem;
            font-weight: bold;
            color: #007bff;
        }
        .categorie {
            font-size: 1.3rem;
            margin-top: 8px;
        }
        .fout {
            color: #dc3545;
            margin-top: 12px;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>BMI Calculator</h1>

    <form method="post">
        {% csrf_token %}
        <label for="gewicht">Gewicht (kg)</label>
        <input type="number" id="gewicht" name="gewicht" step="0.1" min="1"
               value="{{ gewicht }}" placeholder="bijv. 70" required>

        <label for="lengte">Lengte (cm)</label>
        <input type="number" id="lengte" name="lengte" step="0.1" min="1"
               value="{{ lengte }}" placeholder="bijv. 175" required>

        <button type="submit">Bereken BMI</button>
    </form>

    {% if fout %}
        <p class="fout">{{ fout }}</p>
    {% endif %}

    {% if bmi %}
        <div class="resultaat">
            <div class="bmi-waarde">{{ bmi }}</div>
            <div class="categorie">{{ categorie }}</div>
        </div>
    {% endif %}
</body>
</html>
